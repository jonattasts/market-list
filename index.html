<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Market List</title>
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-container">
      <div id="toast" class="toast">
        <ion-icon id="toast-icon" name="alert-circle-outline"></ion-icon>
        <span id="toast-message"></span>
      </div>

      <div id="home-screen">
        <header>
          <h1>Market List</h1>
        </header>
        <div class="home-content">
          <div class="welcome-card">
            <span class="emoji-main">🛒</span>
            <h2>Boas compras!</h2>
            <p>Organize suas listas e controle seus gastos de forma simples.</p>
            <button class="btn-start" onclick="openNewListForm()">
              Criar nova lista
            </button>
            <button
              class="btn-secondary"
              onclick="showScreen('market-lists-screen')"
              style="
                margin-top: 10px;
                background: transparent;
                color: var(--primary);
                font-weight: 600;
                border: none;
                cursor: pointer;
              "
            >
              Ver minhas listas
            </button>
          </div>
        </div>
      </div>

      <div id="market-lists-screen" style="display: none">
        <header>
          <div class="header-action" onclick="showScreen('home-screen')">
            <ion-icon
              name="arrow-back-outline"
              style="font-size: 28px"
            ></ion-icon>
          </div>
          <h1 class="header-title">Listas de Compras</h1>
          <div class="header-action" onclick="openNewListForm()">
            <ion-icon name="add-sharp" style="font-size: 32px"></ion-icon>
          </div>
        </header>
        <div class="search-section">
          <div class="search-group">
            <ion-icon name="search-outline"></ion-icon>
            <input
              type="text"
              id="search-input"
              placeholder="Buscar por nome, data ou local..."
              oninput="renderMarketLists()"
            />
          </div>
        </div>
        <div
          class="list-container master-list"
          id="lists-master-container"
        ></div>
      </div>

      <div id="new-list-screen" style="display: none">
        <header>
          <div class="header-action" onclick="handleBackFromForm()">
            <ion-icon
              name="arrow-back-outline"
              style="font-size: 28px"
            ></ion-icon>
          </div>
          <h1 id="form-title" class="header-title" style="text-align: start">
            Nova Lista
          </h1>
        </header>
        <div class="form-section">
          <div class="form-card dashboard">
            <span
              class="emoji-main"
              style="font-size: 40px; margin-bottom: 20px"
              >📋</span
            >
            <div class="input-field">
              <label>Nome da Lista<span style="color: #ff4757">*</span></label>
              <input
                type="text"
                id="new-list-name"
                placeholder="Ex: Compras do Mês"
              />
            </div>
            <div class="input-field" style="margin-top: 20px">
              <label>Local da Compra</label>
              <input
                type="text"
                id="new-list-location"
                placeholder="Ex: Assaí Atacadista"
              />
            </div>
            <div class="input-field" style="margin-top: 20px">
              <label>Data da Compra<span style="color: #ff4757">*</span></label>
              <input type="date" id="new-list-date" />
            </div>
            <button
              id="btn-save-list"
              class="btn-start"
              style="margin-top: 30px"
              onclick="handleSaveNewList()"
            >
              Salvar
            </button>
          </div>
        </div>
      </div>

      <div id="new-category-screen" style="display: none">
        <header>
          <div
            class="header-action"
            onclick="showScreen('market-list-screen-details')"
          >
            <ion-icon
              name="arrow-back-outline"
              style="font-size: 28px"
            ></ion-icon>
          </div>
          <h1
            id="category-form-title"
            class="header-title"
            style="text-align: start"
          >
            Nova Categoria
          </h1>
        </header>
        <div class="form-section">
          <div class="form-card dashboard">
            <span
              class="emoji-main"
              style="font-size: 40px; margin-bottom: 20px"
              >📁</span
            >
            <div class="input-field">
              <label
                >Nome da Categoria<span style="color: #ff4757">*</span></label
              >
              <input
                type="text"
                id="new-category-name"
                placeholder="Ex: Higiene, Bebidas, Carnes..."
              />
            </div>
            <button
              id="btn-save-category"
              class="btn-start"
              style="margin-top: 30px"
              onclick="handleSaveCategory()"
            >
              Salvar
            </button>
          </div>
        </div>
      </div>

      <div id="new-item-screen" style="display: none">
        <header>
          <div
            class="header-action"
            onclick="showScreen('market-list-screen-details')"
          >
            <ion-icon
              name="arrow-back-outline"
              style="font-size: 28px"
            ></ion-icon>
          </div>
          <h1
            id="item-form-title"
            class="header-title"
            style="text-align: start"
          >
            Novo Item
          </h1>
        </header>
        <div class="form-section">
          <div class="form-card dashboard">
            <span
              class="emoji-main"
              style="font-size: 40px; margin-bottom: 20px"
              >🛍️</span
            >

            <div class="input-field">
              <label
                >Nome do Produto<span style="color: #ff4757">*</span></label
              >
              <input
                type="text"
                id="item-name-input"
                placeholder="Ex: Arroz Integral"
              />
            </div>

            <div class="input-field" style="margin-top: 20px">
              <label>Descrição / Quantidade</label>
              <input
                type="text"
                id="item-desc-input"
                placeholder="Ex: Pacote 5kg"
              />
            </div>

            <div class="input-field" style="margin-top: 20px">
              <label>Preço Unitário (R$)</label>
              <input
                type="text"
                id="item-price-input"
                placeholder="0,00"
                oninput="formatCurrencyInput(this)"
              />
            </div>

            <div class="input-field" style="margin-top: 20px">
              <label>Categoria</label>
              <select
                id="item-category-select"
                style="
                  width: 100%;
                  padding: 14px;
                  border-radius: 12px;
                  border: 1px solid var(--border-color);
                  background-color: var(--bg-page);
                  font-size: 15px;
                "
              ></select>
            </div>

            <button
              class="btn-start"
              style="margin-top: 30px"
              onclick="handleSaveItem()"
            >
              Salvar
            </button>
          </div>
        </div>
      </div>

      <div id="market-list-screen-details" style="display: none">
        <header>
          <div class="header-action" onclick="exitDetailsScreen()">
            <ion-icon
              name="arrow-back-outline"
              style="font-size: 28px"
            ></ion-icon>
          </div>
          <div
            style="
              flex: 1;
              display: flex;
              align-items: center;
              justify-content: center;
              gap: 8px;
            "
          >
            <h1
              id="main-list-title"
              class="header-title"
              style="flex: none; padding: 0"
            >
              Detalhes
            </h1>
          </div>
          <div class="header-action"></div>
        </header>

        <div class="dashboard">
          <div class="dashboard-header">
            <h2 class="items-label">Resumo:</h2>
            <span class="item-count" id="total-qty">0 itens</span>
          </div>
          <div class="status-text">
            <span id="checked-count">0 comprado(s)</span>
          </div>
          <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
        </div>

        <div
          class="category-actions"
          style="padding: 0 16px 10px; display: flex; gap: 10px"
        >
          <button
            class="btn-add-cat"
            onclick="openNewCategoryForm()"
            style="
              background: var(--bg-card);
              border: 1px dashed var(--primary);
              color: var(--primary);
              padding: 8px 12px;
              border-radius: 8px;
              font-size: 12px;
              font-weight: 600;
              flex: 1;
              display: flex;
              align-items: center;
              justify-content: center;
              gap: 5px;
            "
          >
            <ion-icon
              name="add-circle-outline"
              style="color: var(--primary); font-size: 16px"
            ></ion-icon>
            Nova Categoria
          </button>
          <button
            class="btn-add-item"
            onclick="openNewItemForm()"
            style="
              background: var(--primary);
              border: none;
              color: white;
              padding: 8px 12px;
              border-radius: 8px;
              font-size: 12px;
              font-weight: 600;
              flex: 1;
              display: flex;
              align-items: center;
              justify-content: center;
              gap: 5px;
            "
          >
            <ion-icon
              name="cart-outline"
              style="color: white; font-size: 16px"
            ></ion-icon>
            Adicionar Item
          </button>
        </div>

        <div class="list-container" id="list-items-container"></div>

        <div class="details-footer">
          <div class="footer-row">
            <span class="footer-label">Subtotal (Previsão):</span>
            <span class="footer-value" id="subtotal-all">R$ 0,00</span>
          </div>
          <div class="footer-row total-row">
            <span class="footer-label">Total Marcado:</span>
            <span class="footer-value highlight" id="total-checked"
              >R$ 0,00</span
            >
          </div>
        </div>
      </div>
    </div>

    <script src="scripts.js"></script>
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
  </body>
</html>
