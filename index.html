<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Market List</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-container">
      <div id="home-screen">
        <header>
          <h1>Market List</h1>
        </header>
        <div class="home-content">
          <div class="welcome-card">
            <span class="emoji-main">🛒</span>
            <h2>Boas compras!</h2>
            <p>Organize suas listas e controle seus gastos de forma simples.</p>
            <button
              class="btn-start"
              onclick="showScreen('market-lists-screen')"
            >
              Ver listas de compras
            </button>
          </div>
        </div>
      </div>

      <div id="market-lists-screen" style="display: none">
        <header>
          <div class="header-action" onclick="showScreen('home-screen')">
            <ion-icon
              name="arrow-back-outline"
              style="font-size: 28px"
            ></ion-icon>
          </div>
          <h1 class="header-title">Listas de Compras</h1>
          <div class="header-action" onclick="addNewList()">
            <ion-icon name="add-sharp" style="font-size: 32px"></ion-icon>
          </div>
        </header>

        <div class="search-section">
          <div class="search-group">
            <ion-icon name="search-outline"></ion-icon>
            <input
              type="text"
              id="search-input"
              placeholder="Buscar lista pelo nome..."
              oninput="renderMarketLists()"
            />
          </div>
        </div>

        <div
          class="list-container master-list"
          id="lists-master-container"
        ></div>
      </div>

      <div id="market-list-screen-details" style="display: none">
        <header>
          <div
            class="header-action"
            onclick="showScreen('market-lists-screen')"
          >
            <ion-icon
              name="arrow-back-outline"
              style="font-size: 28px"
            ></ion-icon>
          </div>
          <h1 id="main-list-title" class="header-title">Detalhes</h1>
        </header>

        <div class="dashboard">
          <div class="dashboard-header">
            <h2 class="items-label">Itens adicionados:</h2>
            <span class="item-count" id="total-qty">0 itens</span>
          </div>
          <div class="status-text">
            <span id="checked-count">0 comprados</span>
          </div>
          <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
        </div>

        <div class="input-section">
          <div class="input-group">
            <span class="icon">🛒</span>
            <input
              type="text"
              id="item-input"
              placeholder="Adicione novo item (Ex: Arroz; 5kg; 18,90)"
            />
          </div>
        </div>
        <div class="list-container" id="list-items-container"></div>
      </div>
    </div>

    <script src="scripts.js"></script>
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
  </body>
</html>
